services:
  # Service 1: Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Service 2: Backend (Django / DRF)
  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app  # Maps your local code to the container for live-reloading
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

  # Service 3: Frontend (React / Vite)
  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overwriting container's
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Ensures hot-reloading works inside Docker

  # Service 4: Reverse Proxy (Nginx)
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

# Persist the database data even if containers are destroyed
volumes:
  postgres_data: